<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Raw - حماية الكود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f1c;
            font-family: 'Segoe UI', 'Inter', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(16, 22, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid #2a3560;
            width: 100%;
            max-width: 760px;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        h2 {
            color: #b3d0ff;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .upload-area {
            background: #010715;
            border: 2px dashed #2d4379;
            border-radius: 1.2rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background: #0c1428;
        }
        .filename {
            background: #010101aa;
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #9ab3e0;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        button {
            flex: 1;
            background: #19233f;
            border: none;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        button.primary {
            background: #2563eb;
            box-shadow: 0 2px 12px #2563eb50;
        }
        button.primary:hover {
            background: #3b82f6;
        }
        .result {
            background: #01040e;
            border-radius: 1rem;
            margin-top: 20px;
            padding: 1rem;
            border: 1px solid #1f2b4e;
        }
        .result pre {
            background: #000000aa;
            padding: 14px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.75rem;
            color: #b9e0ff;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .copy {
            background: #2a3a66;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            border: none;
            width: auto;
            margin-top: 8px;
        }
        .error {
            color: #ff9f9f;
            background: #44000066;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            background: #1e293b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            transform: translateX(-50%);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🔒 HIDDEN RAW (HTTPS)</h2>
    <div class="upload-area" id="uploadZone">
        📂 اختر ملف (.lua / .txt)
        <div class="filename" id="fileName">لا يوجد ملف</div>
        <input type="file" id="fileInput" accept=".lua,.txt" style="display:none">
    </div>

    <div class="btn-group">
        <button class="primary" id="generateBtn">🌐 إنشاء رابط RAW + loadstring</button>
        <button id="resetBtn">🗑️ مسح</button>
    </div>

    <div id="resultBox" class="result" style="display: none;">
        <div>📋 أمر التشغيل (لـ Delta / أي منفذ):</div>
        <pre id="codeBlock"></pre>
        <button id="copyBtn" class="copy">📋 نسخ الأمر</button>
        <div style="font-size: 0.7rem; margin-top: 8px; opacity: 0.7;">⚠️ رابط raw <strong>https://</strong> حقيقي، ولكن أي شخص يفتحه مباشرة سيرى رسالة منع وصول.</div>
    </div>
</div>
<div id="toastMsg" class="toast">✅ تم النسخ</div>

<script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileNameSpan = document.getElementById('fileName');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultBox = document.getElementById('resultBox');
    const codeBlock = document.getElementById('codeBlock');
    const copyBtn = document.getElementById('copyBtn');
    const toast = document.getElementById('toastMsg');

    let currentContent = null;
    let currentFileName = null;
    let lastRawUrl = null;

    function showToast(msg, isErr = false) {
        toast.textContent = msg;
        toast.style.backgroundColor = isErr ? "#b91c1c" : "#1e293b";
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2000);
    }

    function reset() {
        currentContent = null;
        currentFileName = null;
        fileNameSpan.innerText = "لا يوجد ملف";
        fileInput.value = "";
        resultBox.style.display = "none";
        if (lastRawUrl) lastRawUrl = null;
    }

    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.name.endsWith('.lua') && !file.name.endsWith('.txt')) {
            showToast("❌ فقط .lua أو .txt", true);
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentContent = ev.target.result;
            currentFileName = file.name;
            fileNameSpan.innerText = file.name;
            resultBox.style.display = "none";
            showToast(`✅ تم رفع ${file.name}`, false);
        };
        reader.readAsText(file);
    });

    // دالة رفع النص إلى خدمة خارجية للحصول على رابط RAW حقيقي (https)
    async function uploadToPasteService(content, fileName) {
        // باستخدام خدمة rentry.co (تدعم raw)
        const response = await fetch('https://rentry.co/api/new', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                code: content,
                edit_code: Math.random().toString(36).substring(7)
            })
        });
        if (!response.ok) throw new Error('فشل الرفع');
        const data = await response.json();
        if (data.url && data.url.startsWith('https://rentry.co/')) {
            const rawUrl = data.url.replace('https://rentry.co/', 'https://rentry.co/raw/');
            return rawUrl;
        }
        throw new Error('لم نستلم رابط raw');
    }

    generateBtn.addEventListener('click', async () => {
        if (!currentContent) {
            showToast("⚠️ الرجاء رفع ملف أولاً!", true);
            return;
        }
        generateBtn.disabled = true;
        generateBtn.innerText = "⏳ جاري رفع الملف...";
        try {
            const rawLink = await uploadToPasteService(currentContent, currentFileName);
            lastRawUrl = rawLink;
            const loadstringCmd = `loadstring(game:HttpGet("${rawLink}"))()`;
            codeBlock.innerText = loadstringCmd;
            resultBox.style.display = "block";
            showToast("✅ تم إنشاء الرابط", false);
        } catch (err) {
            console.error(err);
            showToast("❌ فشل الرفع إلى الخادم, حاول مجدداً", true);
        } finally {
            generateBtn.disabled = false;
            generateBtn.innerText = "🌐 إنشاء رابط RAW + loadstring";
        }
    });

    copyBtn.addEventListener('click', () => {
        if (!codeBlock.innerText) return;
        navigator.clipboard.writeText(codeBlock.innerText);
        showToast("📋 تم نسخ الأمر!", false);
    });

    resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
